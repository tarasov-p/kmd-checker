services:
  kmd-checker:
    build: .
    image: kmd-checker:latest
    container_name: kmd-checker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env}
      OPENROUTER_HTTP_REFERER: https://github.com/tarasov-p/kmd-checker
      OPENROUTER_X_TITLE: kmd-checker
      KMD_LOG_LEVEL: INFO
      KMD_ARCHIVE_DIR: /archive
    volumes:
      - kmd-tmp:/tmp
      # Персистентный архив проверок (host bind-mount): входной файл,
      # result.json по каждой сессии и общий metrics.jsonl. Переживает рестарт.
      - ./data/archive:/archive

volumes:
  kmd-tmp: {}
